<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<header class="bg-dark p-3 text-light text-center ">
    <h1>formularios</h1>
</header>
<main class="container p-5">
    <section>
        <h2>formulario de login</h2>
        <form action="./formulario.html" class="border border-3 p-3 mb-5  rounded-4  shadow" >
            <label class="form-label mb-3" for="email">email </label>
            <input class="form-control" placeholder="informe seu email" maxlength="45" minlength="5" required type ="email">
            <label class="form-label">senha</label>
            <input class="form-control" placeholder="informe sua senha" type="password">
            <button type="submit" aria-required="" class="btn btn-primary w-100 py-2">entrar</button> 
        </form>
    </section>
    
</main>
</body>
</html>
